spring.application.name=hospitalmanagement
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3307/hospital_app?useSSL=false&serverTimezone=UTC
spring.datasource.username=springuser
spring.datasource.password=spring@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For dev only: create/update DB tables from entities
spring.jpa.hibernate.ddl-auto=update

# show SQL in console
spring.jpa.show-sql=true

# Hibernate dialect - works with modern Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

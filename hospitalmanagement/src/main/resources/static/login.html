<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --primary:#2563eb;
      --muted:#6b7280;
      --danger:#ef4444;
      --success:#059669;
      --radius:12px;
      --glass: rgba(37,99,235,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,var(--bg),#eef4ff 60%);
      color:#111827;
      padding:28px;
    }
    .page{max-width:480px;margin:48px auto;padding:12px}
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:0 10px 30px rgba(12,32,63,0.08);
      padding:22px 20px;
      overflow:hidden;
    }
    .header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#4f46e5);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px}
    h1{margin:0;font-size:20px}
    p.lead{margin:4px 0 10px;color:var(--muted);font-size:13px}

    form{display:grid;gap:12px}
    label{display:block;font-size:13px;color:#374151}
    input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e6edf8;background:#fcfeff;font-size:14px}
    input::placeholder{color:#9aa4b2}
    input:focus{border-color:var(--primary);box-shadow:0 6px 18px var(--glass);outline:none;transform:translateY(-1px)}
    .small{font-size:12px;color:var(--muted);margin-top:6px}

    .actions{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:8px}
    .btn{background:var(--primary);color:#fff;border:none;padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px rgba(37,99,235,0.12)}
    .btn:hover{transform:translateY(-2px)}
    .link{color:var(--primary);text-decoration:none;font-size:14px}

    .alert{padding:10px;border-radius:10px;display:none;font-weight:600}
    .alert.ok{background:#ecfdf5;color:var(--success);display:block}
    .alert.err{background:#fff1f2;color:var(--danger);display:block}

    .field-error{color:var(--danger);font-size:13px;margin-top:6px;min-height:18px}
    @media (max-width:520px){.page{margin:18px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <div class="logo">HM</div>
        <div>
          <h1>Sign in</h1>
          <p class="lead">  </p>
        </div>
      </div>

      <form id="loginForm" autocomplete="off" novalidate>
        <label>Username
          <input name="username" required placeholder="username" />
          <span class="field-error" data-field="username"></span>
        </label>

        <label>Password
          <input name="password" type="password" required placeholder="password" />
          <span class="field-error" data-field="password"></span>
        </label>

        <div class="actions">
          <button class="btn" type="submit">Sign in</button>
          <a class="link" href="/register.html">Register hospital</a>
        </div>
      </form>

      <div id="loginAlert" class="alert"></div>
    </div>
  </div>

<script>
  const loginForm = document.getElementById('loginForm');
  const loginAlert = document.getElementById('loginAlert');

  function show(msg, ok=true) {
    loginAlert.textContent = msg;
    loginAlert.className = 'alert ' + (ok ? 'ok' : 'err');
    setTimeout(()=>{ loginAlert.textContent=''; loginAlert.className=''; }, 4000);
  }

  function clearFieldErrors() {
    document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFieldErrors();

    const data = Object.fromEntries(new FormData(loginForm).entries());
    data.username = (data.username || '').trim();
    data.password = (data.password || '').trim();

    // client-side checks
    if (!data.username) {
      document.querySelector('.field-error[data-field="username"]').textContent = 'Username is required';
      show('Please fix errors', false); return;
    }
    if (!data.password) {
      document.querySelector('.field-error[data-field="password"]').textContent = 'Password is required';
      show('Please fix errors', false); return;
    }

    // first try local demo credentials saved by register page
    const storedUser = localStorage.getItem('demo_auth_username');
    const storedPass = localStorage.getItem('demo_auth_password');

    if (storedUser && storedPass) {
      if (data.username === storedUser && data.password === storedPass) {
        show('Login successful (demo)', true);
        localStorage.setItem('demo_token', 'demo-'+Date.now());
        // redirect if you have a protected page:
        // location.href = '/dashboard.html';
        return;
      } else {
        show('Invalid username or password (demo)', false);
        return;
      }
    }

    // no demo creds: try backend auth endpoint /api/auth/login (if you implemented it)
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const json = await res.json();
        show('Login success', true);
        // if server returns a token, store it
        if (json.token) localStorage.setItem('token', json.token);
        // redirect example
        // location.href = '/dashboard.html';
      } else {
        const err = await res.json().catch(()=>({message:res.statusText}));
        show('Login failed: ' + (err.message || res.statusText), false);
      }
    } catch (err) {
      show('No local credentials and /api/auth/login unavailable. Register first or implement backend login.', false);
    }
  });
</script>
</body>
</html>
